services:
  postgres:
    image: postgres:15-alpine
    container_name: library-postgres
    restart: always
    environment:
      POSTGRES_DB: library_db
      POSTGRES_USER: library_user
      POSTGRES_PASSWORD: library_password
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - library-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library_user -d library_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: library-api:${IMAGE_VERSION:-1.0.0}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: library-app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: library_db
      DB_USER: library_user
      DB_PASS: library_password
      TZ: UTC
    ports:
      - "8080:8080"
    networks:
      - library-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  pgadmin:
    image: dpage/pgadmin4:8.10
    container_name: library-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@library.com
      PGADMIN_DEFAULT_PASSWORD: admin_password
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - library-network
    profiles:
      - dev

volumes:
  postgres_data:
    driver: local

networks:
  library-network:
    driver: bridge