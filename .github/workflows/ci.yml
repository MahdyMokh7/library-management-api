name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  POSTGRES_DB: library_db_test
  POSTGRES_USER: test_user
  POSTGRES_PASSWORD: test_password

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # PostgreSQL service container for integration tests
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Clone the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Java 22 for compilation
      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
          cache: maven

      # Cache downloaded dependencies for faster builds
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # Run all unit tests
      - name: Run Unit Tests
        run: mvn test
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/${{ env.POSTGRES_DB }}
          SPRING_DATASOURCE_USERNAME: ${{ env.POSTGRES_USER }}
          SPRING_DATASOURCE_PASSWORD: ${{ env.POSTGRES_PASSWORD }}

      # Package application into JAR file
      - name: Build and Package
        run: mvn clean package -DskipTests

      # Create Docker image from JAR
      - name: Build Docker image
        run: docker build -t library-api:latest .

      # Start containers (app + postgres)
      - name: Start Docker Compose services
        run: docker-compose up -d

      # Wait for app to be healthy before running integration tests
      - name: Wait for application to be ready
        run: |
          echo "Waiting for application to start..."
          for i in {1..30}; do
            if curl -s -f http://localhost:8080/actuator/health > /dev/null; then
              echo "Application is ready!"
              exit 0
            fi
            echo "Attempt $i/30 - Application not ready yet. Waiting..."
            sleep 5
          done
          echo "Application failed to start within timeout"
          docker-compose logs
          exit 1

      # Run integration tests against running containers
      - name: Run Integration Tests
        run: docker-compose run --rm app mvn verify
        env:
          SPRING_PROFILES_ACTIVE: docker
          SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${{ env.POSTGRES_DB }}
          SPRING_DATASOURCE_USERNAME: ${{ env.POSTGRES_USER }}
          SPRING_DATASOURCE_PASSWORD: ${{ env.POSTGRES_PASSWORD }}

      # Generate code coverage report
      - name: Generate JaCoCo coverage report
        run: docker-compose run --rm app mvn jacoco:report

      # Upload coverage report as artifact for download
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/
          retention-days: 7

      # Enforce Google Java Format
      - name: Check code formatting
        run: mvn spotless:check

      # Always cleanup even if previous steps failed
      - name: Stop Docker Compose services
        if: always()
        run: docker-compose down