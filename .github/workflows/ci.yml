name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  POSTGRES_DB: library_db_test
  POSTGRES_USER: test_user
  POSTGRES_PASSWORD: test_password

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # Clone the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Java 22 for compilation
      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
          cache: maven

      # Cache downloaded dependencies for faster builds
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # Enforce Google Java Format (Fail early if code style is wrong)
      - name: Check code formatting
        run: mvn spotless:check

      # Start ONLY Postgres and wait for its healthcheck to pass before testing starts
      - name: Start Database for Tests
        run: docker compose up -d --wait postgres

      # Run all tests (Unit + Integration) and static analysis in a single, efficient lifecycle run
      - name: Run Build, Test and Static Analysis
        run: mvn clean verify pmd:check
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/${{ env.POSTGRES_DB }}
          SPRING_DATASOURCE_USERNAME: ${{ env.POSTGRES_USER }}
          SPRING_DATASOURCE_PASSWORD: ${{ env.POSTGRES_PASSWORD }}

      # Generate code coverage report directly on the runner
      - name: Generate JaCoCo coverage report
        if: always()
        run: mvn jacoco:report

      # Upload coverage report as artifact for download
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/
          retention-days: 7

      # Create Docker image to ensure the application packages into its final container cleanly
      - name: Build Docker image
        run: docker build -t library-api:latest .

      # Always cleanup even if previous steps failed
      - name: Stop Docker Compose services
        if: always()
        run: docker compose down